<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>GoingDay</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">GoingDay</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card>
    <ion-card-header>
      <ion-card-title>Create Account</ion-card-title>
    </ion-card-header>
  
    <ion-card-content>
      <form (ngSubmit)="createAccount()" [formGroup]="credentials">
        <ion-item>
          <ion-label position="stacked">Email: </ion-label>
          <ion-input type="email" inputmode="email" placeholder="Email" formControlName="email"></ion-input>
          <ion-note slot="error" *ngIf="(email.dirty || email.touched) && email.errors">Please insert a valid email</ion-note>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">Password: </ion-label>
          <ion-input type="password" placeholder="Password" formControlName="password"></ion-input>
          <ion-note slot="error" *ngIf="(password.dirty || password.touched) && password.errors?.['required']">Please insert a password</ion-note>
          <ion-note slot="error" *ngIf="(password.dirty || password.touched) && password.errors?.['minlength']">Minlength 6 characters</ion-note>
          
        </ion-item>
        <ion-button type="submit" expand="block" strong="true" [disabled]="credentials.invalid">Create account</ion-button>
      </form>
    </ion-card-content>
  </ion-card>
</ion-content>
